name: shellcheck

on:
  push:
    paths:
      - 'bin/**'
      - 'hooks/**'
      - 'shell/**'
      - 'extras/**'
      - '.shellcheckrc'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - 'bin/**'
      - 'hooks/**'
      - 'shell/**'
      - 'extras/**'
      - '.shellcheckrc'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        run: |
          shellcheck --version
          # Lint every *.sh under the script dirs. shell/cw.zsh is deliberately
          # excluded — shellcheck only supports sh/bash/dash/ksh, not zsh. Per-file
          # shell comes from each shebang; baseline disables live in .shellcheckrc.
          count=$(find bin hooks shell extras -name '*.sh' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "no shell scripts found — nothing to lint" >&2
            exit 1
          fi
          echo "Checking $count script(s):"
          find bin hooks shell extras -name '*.sh' | sort | sed 's/^/  /'
          find bin hooks shell extras -name '*.sh' -print0 | sort -z | xargs -0 shellcheck
