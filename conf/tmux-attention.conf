# tmux-attention.conf — Claude multi-session attention layer (claude-fleet).
# Sourced from ~/.tmux.conf (bin/reapply-tmux-attention.sh adds the line).
# NB: paths below assume the canonical install dir ~/.claude/fleet — adjust if
# you installed elsewhere.
#
# Windows recolor by Claude session state, set the instant it changes by
# Claude Code hooks -> bin/set-claude-state.sh (NOT on the status-interval
# timer; that only refreshes the right side).
#   cyan   spinner = working -> Claude is alive (pulses with tool cadence)
#   indigo spinner = looping -> a /loop between iterations (set by the classifier)
#   green  ✓       = done    -> turn ended / loop paused or finished (Stop)
#   red    !       = needs   -> BLOCKED, waiting for your answer (Notification) + bell
# The focused window always shows an inverted block via window-status-current-format.

set -g monitor-bell on
set -g allow-passthrough on
# Keep window numbers contiguous and matching display order (no gaps like 0,1,4,7)
# so prefix+N always targets the Nth window you see. base-index 1 = first window is 1.
set -g base-index 1
set -g renumber-windows on
# Keep window names set explicitly at creation — don't let the running process
# overwrite them.
set -g allow-rename off
setw -g automatic-rename off

# Fixed-width 2-col indicator GUTTER so the glyph swaps in place and the name
# never reflows. The bin/tmux-spinner.sh daemon sets @spin (glyph), @sfg
# (glyph fg hex, pulsing) and @nfg (name fg hex). The #[fg=..] directives are
# written DIRECTLY here (only the hex value is substituted) so styling always
# renders. Current window = inverted block, no spinner (you're already looking
# at it); its 3 leading spaces keep it aligned with the others' 1-pad + 2-col gutter.
# @prci/@pfg (set by the collector) append the window's open-PR CI state after
# the name: red ✗ = CI failed (sorter treats like needs) · green ✓ = mergeable.
set -g window-status-format " #{?@sfg,#[fg=#{@sfg}],}#{?@spin,#{@spin},  }#{?@nfg,#[fg=#{@nfg}],}#I:#W#{?@prci, #[fg=#{@pfg}]#{@prci},} "
set -g window-status-style "fg=#565f89"
set -g window-status-current-format "#[bg=#a9b1d6,fg=#1a1b26,bold]   #I:#W "
setw -g window-status-separator ""

# --- OPT-IN: top-of-pane "you are here" header --------------------------------
# A header line at the TOP of every pane naming its window — index:name, the
# bound ##{@issue} if the window is issue-bound, and a red ● when that session is
# BLOCKED on your answer (@claude_state=needs). Independent of the bottom bar.
# Renders on single-pane windows too (verified tmux 3.6a; older tmux only drew
# pane borders with >1 pane). Costs 1 row of height per pane.
#
# Redundant if you keep the bottom window list above visible — most useful when
# you HIDE that list (dash/other navigator as the window index) and still want a
# per-pane "which session am I in". Uncomment to enable.
# NB literal '#' before the issue needs '###' (## -> literal #, then #{@issue}).
# set -g pane-border-status top
# set -g pane-border-format "#{?pane_active,#[fg=#7aa2f7]#[bold],#[fg=#565f89]} #{window_index}:#{window_name}#[nobold]#{?#{@issue}, ###{@issue},}#{?#{==:#{@claude_state},needs}, #[fg=#f7768e]●,} #[default]"
# set -g pane-border-style "fg=#3b4261"
# set -g pane-active-border-style "fg=#7aa2f7"

# --- status bar basics (Tokyo Night; delete this block if you have your own) ---
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length 40
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#565f89]│"
set -g status-right-length 110
set -g status-right "#(bash ~/.claude/fleet/bin/tmux-status.sh)"
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
set -g message-command-style "bg=#1a1b26,fg=#7aa2f7"

# --- keybindings ---
# prefix + a : jump to the next session that needs you (red) or is done (green)
bind a run-shell "sh ~/.claude/fleet/bin/next-attention.sh"
# prefix + j : jump to the interactive dash window (fzf mission control: state ·
#   issue · model · ctx% · summary; enter jumps, type a task + enter = new
#   issue-bound session). Creates the window if missing.
bind j run-shell "tmux select-window -t dash 2>/dev/null || tmux new-window -n dash 'bash ~/.claude/fleet/bin/tmux-dashboard.sh'"
# prefix + b : BACKLOG MODAL — near-fullscreen popup over whatever you're doing.
#   esc closes; enter spawns the issue's session and closes (you land on it).
#   Manage issues in place: ⌃p toggles a preview pane (body/labels/comments),
#   ⌃x closes the highlighted issue (y/n confirm), ⌃o opens it on the web.
#   (Prefer a dedicated two-pane window instead? run tmux-issues.sh roadmap /
#   unplanned in a window's panes — the no-POPUP mode still loops forever.)
bind b display-popup -E -w 96% -h 92% "POPUP=1 bash ~/.claude/fleet/bin/tmux-issues.sh all"
# prefix + r : hot-reload tmux config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded ✓"

# let programs set the client clipboard (OSC52), e.g. gh-glance URL copy
set -g set-clipboard on
set -g focus-events on

# solid pane split line — no active-pane highlight on switch
set -g pane-border-style 'fg=#565f89'
set -g pane-active-border-style 'fg=#565f89'
