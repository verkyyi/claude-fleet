# tmux-attention.conf — Claude multi-session attention layer (claude-fleet).
# Sourced from ~/.tmux.conf (bin/reapply-tmux-attention.sh adds the line).
# NB: paths below assume the canonical install dir ~/.claude/fleet — adjust if
# you installed elsewhere.
#
# Windows recolor by Claude session state, set the instant it changes by
# Claude Code hooks -> bin/set-claude-state.sh (NOT on the status-interval
# timer; that only refreshes the right side).
#   cyan   spinner = working -> Claude is alive (pulses with tool cadence)
#   indigo spinner = looping -> a /loop between iterations (set by the classifier)
#   green  ✓       = done    -> turn ended / loop paused or finished (Stop)
#   red    !       = needs   -> BLOCKED, waiting for your answer (Notification) + bell
# The focused window always shows an inverted block via window-status-current-format.

# --- FLEET BASELINE: opinionated tmux defaults the fleet UX assumes ----------
# These moved here from the operator's personal ~/.tmux.conf (issue #222) so a
# FRESH install gets a consistent fleet UI/UX without hand-editing tmux.conf —
# previously they lived only in a pre-repo install.sh's ~/.tmux.conf, so the
# clickable footer, truecolor theme, and snappy ESC silently didn't work on a
# clean install. All are OPINIONATED: override any of them from your OWN
# ~/.tmux.conf AFTER the `source-file …tmux-attention.conf` line (later wins),
# or comment them out here. Truly personal bits (a prefix remap, personal binds)
# stay in your ~/.tmux.conf and are intentionally NOT shipped.
#
# mouse — REQUIRED for the fleet's clickable status ranges (the ⌂ hub icon, the
#   #S fleet-switcher, the ● needs badge, the ◉ account chip — see the
#   MouseDown1Status bind below) and the dashboard's fzf mouse. Trade-off: mouse
#   mode captures select-to-copy in most terminals (hold Shift — or Option on
#   macOS/iTerm — to bypass, terminal-dependent). Comment out to keep native
#   selection and skip the footer clicks; prefix+a / prefix+g / F9 stay as the
#   keyboard paths.
set -g mouse on
# Truecolor — the theme below uses 24-bit hex colors (#1a1b26 …); without a
#   truecolor-capable TERM they degrade to the nearest 256-color. Set
#   default-terminal to match your terminal if it differs (e.g. screen-256color);
#   the Tc override is additive (-ga) and harmless when already truecolor. On
#   tmux ≥3.2 the modern spelling is `set -as terminal-features ",*:RGB"`.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
# Snappier ESC — the default 500ms delay makes the Claude TUI / vim feel laggy
#   on ESC; 10ms is imperceptible for prefix chords.
set -g escape-time 10
# Deep scrollback — a long worker turn scrolls off a small buffer fast.
set -g history-limit 50000

set -g monitor-bell on
set -g allow-passthrough on
# Keep window numbers contiguous and matching display order (no gaps like 0,1,4,7)
# so prefix+N always targets the Nth window you see. base-index 1 = first window is 1.
set -g base-index 1
set -g renumber-windows on
# Keep window names set explicitly at creation — the fleet navigates by name
# (dash / prefix+a), so don't let the running process rename windows out from
# under it. (Baseline; grouped with the block above conceptually.)
set -g allow-rename off
setw -g automatic-rename off

# --- per-window list: REMOVED (issue #105) ------------------------------------
# The per-window status strip grew unwieldy with many workers, so the list is
# gone — window-status-format/-current-format are empty and the bar collapses to
# status-left … status-right. The "who needs me" signal it carried now lives in
# a single compact needs-count badge in status-left (see below).
# The hub cue survives the removal: the always-on status-left "⌂" hub icon (#141)
# and the @steward pane-border title (further down) both render independently of
# the list.
# bin/tmux-spinner.sh still tracks per-window @spin/@sfg/@nfg + @claude_state
# (it drives the needs tally) — those just aren't rendered inline anymore.
set -g window-status-format ""
set -g window-status-current-format ""
setw -g window-status-separator ""

# --- TOP-OF-WINDOW HEADER: "you are here" per window (issue #267) --------------
# Every window shows a header at the TOP of its pane naming the session it holds
# — "index:name" plus the bound ` ##{@issue}` when the window is issue-bound — so
# you always know which worker/scratch you're looking at, EXCEPT the hub, which
# keeps its own steward cue instead of an issue/name header (see the format's
# @steward / @dash branches below).
#
# `pane-border-status top` is ON globally so this reaches EVERY window uniformly —
# spawned (dash-issue-session.sh), restored (fleet-restore.sh's raw new-window),
# and ad-hoc alike — without each spawn path having to opt in. It costs 1 row of
# height per pane. Renders on single-pane windows too (verified tmux 3.6a; older
# tmux only drew pane borders with >1 pane). bin/steward-session.sh still sets it
# on the hub window explicitly, which is now just a redundant re-affirm.
#
# The format is a three-way branch on the pane's role markers:
#   @steward=1 → "▸ STEWARD HUB · <fleet>" (the hub cue; survives fullscreen zoom
#                via F9 / steward-zoom.sh, where the border is the only cue)
#   @dash=1    → empty — the hub's dash pane is part of the hub, so no issue/name
#                header (this is what "except the hub" means at the pane level)
#   else       → the worker/scratch header: index:name + the bound ##{@issue}
# NB literal '#' before the issue needs '###' (## -> literal #, then #{@issue}).
# NB2 styles are written as SEPARATE tokens (#[fg=…]#[bold]), never the comma form
# #[fg=…,bold]: a comma inside #[…] is swallowed by the enclosing #{?…} as a branch
# separator and the whole branch renders empty (verified tmux 3.6a) — which is why
# the old comma-form steward title never actually drew.
set -g pane-border-status top
set -g pane-border-format "#{?#{==:#{@steward},1},#[fg=#7aa2f7]#[bold]▸ STEWARD HUB · #S #[default],#{?#{==:#{@dash},1},,#{?pane_active,#[fg=#7aa2f7]#[bold],#[fg=#565f89]} #{window_index}:#{window_name}#[nobold]#{?#{@issue}, ###{@issue},} #[default]}}"

# --- status bar basics (Tokyo Night; delete this block if you have your own) ---
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
# status-left-length: bumped 64→72 for the wider (iPad-friendly) tap-target
# padding added inside each status-left chip range (issue #347). The +8 cells of
# chip padding (two spaces flanking each of ⌂ #S ● instead of one) would
# otherwise truncate a long #S fleet name 8 cells sooner; +8 here restores the
# prior headroom.
set -g status-left-length 72
# HUB ICON (#141, #166, #368): an always-on "⌂" as the LEFTMOST element, in every
# window — now NAV-ONLY (issue #368 folded the needy-steward signal into the "● N"
# badge, so the ⌂ no longer turns red). Its BACKGROUND encodes only WHERE you are,
# in two styles:
#   blue block (bg=#7aa2f7) when the ACTIVE window IS the hub — "you're here".
#   dim        (bg=#414868) otherwise — a clickable "go to hub" button.
# (status-left formats in the active window's context, so #W = current window
# name; #W==plan ⇒ hub post-#135.) A needy steward hub now surfaces in the "● N"
# badge itself — the plan window counts as a normal session in @attn_needs (#368) —
# instead of recoloring the ⌂. It stays wrapped in a clickable range=user|hub —
# clicking it runs `steward-zoom.sh --home` (issue #405): a CONSISTENT home tap
# that always lands on the half-dash / half-steward split, even when you're already
# on the hub (F9 without --home still jump-and-toggles the zoom — see the
# MouseDown1Status and F9 binds below).
# Session name (wrapped in a clickable range=user|fleet — clicking the #S name
# opens a picker of RUNNING fleets and switches to the chosen one; see the
# MouseDown1Status bind below). · Then the LOCAL NEEDS BADGE: a red "● N" showing
# how many windows in THIS fleet are in the 'needs' state (@attn_needs, a session
# option set by bin/tmux-spinner.sh — now counts the plan/steward window too, #368),
# hidden at 0 and with NO per-redraw shell fork (the count is precomputed by the
# spinner). It carries a render-time ACTIVE-WINDOW DISCOUNT (#368, supersedes #363):
# status-left renders in the active window's context, so when the window you're ON
# is itself needy (#{@claude_state}==needs, and not an excluded dash/backlog panel)
# it drops off the count — you don't need to be pulled to a window you're already
# on — and the whole chip hides once the discounted count reaches 0. It's wrapped in
# a clickable range (range=user|attn) — clicking it cycles to the next needs window
# via next-attention.sh --needs-cycle (see the MouseDown1Status bind below; clicking
# needs `set -g mouse on`). prefix+a stays the keyboard path.
# · Then the CROSS-FLEET DOT (issue #236, #368): a SECOND "● N" in ORANGE
# (fg=#ff9e64 — the old ⚑ color) that appears when a DIFFERENT live fleet has needy
# windows. N = how many needy windows wait across ALL other fleets (@attn_other_
# windows, a session option set by bin/tmux-spinner.sh's post-scan cross-fleet pass;
# hidden at 0) — the SAME dot language + unit as the local red ●, color alone saying
# "elsewhere" (#368 retired the old orange ⚑ flag glyph and the fleet-count it
# showed). It's its OWN clickable range (range=user|xfleet): one-tap jumps to the
# waiting fleet — exactly one waiting → detach-and-reattach to its socket; several →
# the fleet-picker scoped to waiting fleets (see the MouseDown1Status bind below).
# Distinct from the red local ●: orange ● = "another fleet needs you", red ● = "this
# fleet needs you".
#
# TAP-TARGET PADDING (issue #347): every chip below carries EXTRA inner padding —
# two spaces flanking each glyph (⌂, #S, the red ● N, the orange cross-fleet ● N)
# instead of one — so the clickable range itself is WIDER and easier to hit on
# iPad/Termius touch. The padding sits INSIDE each #[range=user|…] … #[norange] pair
# (a space placed OUTSIDE a range isn't tappable), so it grows the tap zone, not just
# the visual gap; on the ⌂ hub and ● attn chips it also widens their colored bg
# block. status-left-length was bumped 64→72 (above) to keep the same room for a long
# #S name. Font/glyph SIZE is client-side in Termius — tmux can only widen the
# tap-zone WIDTH, which is this.
#
# COMMA ESCAPING (do not "simplify" away): a literal comma inside a #[...] style
# that sits within a #{?cond,a,b} conditional MUST be written #, — tmux's
# conditional splits on the first UNESCAPED comma and #[...] does NOT protect it,
# so a bare "#[fg=x,bold]" truncates the branch to "#[fg=x" and the badge vanishes.
# (The ⌂ hub icon's two style branches and both ● dots escape their commas the same
# way; the arithmetic #{e|-:…,…} discount comma is protected by its own #{…} nesting,
# not by escaping.) The "#[fg=#7aa2f7,bold]" before #S is outside every conditional,
# so its comma stays bare.
set -g status-left "#[range=user|hub]#{?#{==:#W,plan},#[fg=#1a1b26#,bg=#7aa2f7#,bold]  ⌂  ,#[fg=#7aa2f7#,bg=#414868]  ⌂  }#[default]#[norange]#[fg=#7aa2f7,bold]#[range=user|fleet]  #S  #[default]#[norange]#[range=user|attn]#{?#{&&:#{==:#{@claude_state},needs},#{&&:#{!=:#W,dash},#{!=:#W,backlog}}},#{?@attn_needs,#{?#{e|-:#{@attn_needs},1},#[fg=#f7768e#,bold]  ● #{e|-:#{@attn_needs},1}  #[default],},},#{?@attn_needs,#[fg=#f7768e#,bold]  ● #{@attn_needs}  #[default],}}#[norange]#[range=user|xfleet]#{?@attn_other_windows,#[fg=#ff9e64#,bold]  ● #{@attn_other_windows}  #[default],}#[norange]#[fg=#565f89]│"
set -g status-right-length 130
set -g status-right "#(bash ~/.claude/fleet/bin/tmux-status.sh)"
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
set -g message-command-style "bg=#1a1b26,fg=#7aa2f7"

# --- keybindings ---
# prefix + a : jump to the next session that needs you (red) or is done (green)
bind a run-shell "sh ~/.claude/fleet/bin/next-attention.sh"
# prefix + g : progressive DASH focus (dash-zoom.sh) — the mirror of F9's steward
#   focus. From another window it jumps to THIS fleet's 'plan' hub and focuses the
#   embedded dash pane (split view: dash above, steward below); pressed again while
#   already there it toggles the dash pane fullscreen. There is no standalone dash
#   window any more — the dash lives embedded in the hub, so g is the one way in.
#   RENAMED from prefix+G in #318. SHADOWING (issue #325): tmux binds are
#   server-global and last-write-wins, so if your personal ~/.tmux.conf sources a
#   `bind g …` (e.g. the old steward-zoom convention) AFTER this file, YOUR bind
#   wins and prefix+g stops focusing the dash. Drop that personal bind, or move
#   dash-zoom to another key here — this line is only the fleet's default.
bind g run-shell "sh ~/.claude/fleet/bin/dash-zoom.sh"
# MODAL POPUP FLICKER GUARD (issue #308/#431) — every display-popup bind below
#   brackets its popup with `run-shell "tmux set -g @popup_open $(date +%s)" \; …
#   \; set -g @popup_open 0`. A tmux display-popup is a client-side overlay that
#   does NOT freeze the panes under it, so the dash's 1Hz re-render keeps flashing
#   through the popup (worst on double-width CJK cells the popup edge clips).
#   display-popup -E BLOCKS the bind until the popup closes, so stamp → (popup) →
#   set-0 flags "a modal is open" for exactly its lifetime; the dash reload loop
#   (bin/dash-popup-wait.sh) waits on the flag and emits no frame while it's set.
#   set -g = SERVER scope = per-fleet (one tmux server per fleet, #159). The clear
#   runs on esc/abort too — chained commands run after display-popup -E returns
#   however the popup closed.
#
#   THE FLAG IS AN EPOCH, NOT A BARE 1 (issue #431). The one path that leaks it is
#   the popup dying before its trailing `set 0` runs — and that only happens when
#   the CLIENT goes away mid-popup (a `detach-client -E` fleet-switch, a Termius
#   disconnect): the whole `\;`-chain is cut, so `set 0` never runs and the flag
#   strands. Two self-heals: (1) the `client-detached` hook below clears the flag
#   the instant a client leaves — its popup is already gone, so this is always
#   correct and kills the dominant strand outright; (2) stamping `date +%s` (not a
#   bare 1) lets the dash CONSUMER age a stranded value out — it trusts the flag
#   only while `now - @popup_open < FLEET_DASH_POPUP_MAX_AGE` — so a leak that
#   somehow survives an attached client self-expires in ≤ MAX_AGE instead of
#   freezing the dash ~20s per reload forever (the reported bug).
#
# A detached client's popup is already destroyed (display-popup is client-scoped),
# so clearing @popup_open on detach is always correct. This is the PRIMARY fix for
# the reported "dash freezes on Termius/fleet-switch" strand (issue #431).
set-hook -g client-detached 'set -g @popup_open 0'
#
# prefix + b : BACKLOG MODAL — near-fullscreen popup over whatever you're doing.
#   esc closes; enter spawns the issue's session and closes (you land on it).
#   Preview is OFF by default (list-only) — space toggles a preview pane
#   (body/labels/comments, word-wrapped to the pane); / turns on type-to-filter.
#   ⌃x closes the highlighted issue (y/n confirm), ⌃o opens it on the web.
#   (Prefer a dedicated two-pane window instead? run tmux-issues.sh roadmap /
#   unplanned in a window's panes — the no-POPUP mode still loops forever.)
bind b run-shell "tmux set -g @popup_open $(date +%s)" \; display-popup -E -w 96% -h 92% "POPUP=1 bash ~/.claude/fleet/bin/tmux-issues.sh all" \; set -g @popup_open 0
# prefix + n : restore tmux's default next-window (issue #289). The old
#   quick-dispatch (file an issue + spawn its worker) moved to the dash's ⌃n —
#   one keyboard home per action — so `prefix n` goes back to plain next-window.
#   An EXPLICIT bind (not a bare unbind) so a live server that had the override
#   reverts to next-window on the #139 conf-reload, not to a dead key.
bind n next-window
# prefix + A / prefix + u : REMOVED (issue #289). The account picker and the
#   usage/limit detail merged into one usage-modal.sh, reachable by clicking the
#   footer ◉ account chip or the usage stat (MouseDown1Status, below) — one home
#   per surface, no duplicate keyboard path.
# prefix + c : CONFIG MODAL — view/edit this fleet's config across both layers
#   (per-fleet overlay ▸ global ▸ default). Each row = a FLEET_* key · effective
#   value · the layer that set it. ⌃s toggles which layer an edit WRITES to
#   (global fleet.conf ⇄ per-fleet <session>.conf); enter edits the key (typed
#   validation, backs up first). Rebinds tmux's default new-window (spawn via the
#   dash/backlog instead). Key list + help come from fleet.conf.example.
bind c run-shell "tmux set -g @popup_open $(date +%s)" \; display-popup -E -w 86% -h 82% "bash ~/.claude/fleet/bin/tmux-config.sh" \; set -g @popup_open 0
# prefix + R : REMOVED (issue #289). Raw scratch sessions live on the dash's ⌃s
#   (dash-raw-session.sh) — one keyboard home per action, so the duplicate
#   prefix path is dropped.
# prefix + r : restore tmux's default refresh-client (issue #289). The old
#   config hot-reload is gone from the keyboard — /fleet-sync-install now fans a
#   #139 conf-reload out to every live fleet's server (issue #248), so a manual
#   per-window reload bind is redundant. An EXPLICIT bind (not a bare unbind) so a
#   live server reverts cleanly on the conf-reload instead of leaving `r` dead.
bind r refresh-client
# prefix + ? : KEYMAP CHEATSHEET — a popup listing every fleet shortcut, grouped
#   by context (tmux prefix · dash · backlog · config modal), each with a one-line
#   description. q/esc closes it. It's the single discoverable place for all binds
#   (also reachable via a `?` bind inside the dash/backlog). OPINIONATED: this
#   overrides tmux's default `prefix ?` (list-keys) — like `prefix c` rebinds
#   new-window. In a fleet you rarely need raw list-keys; comment this out to
#   keep the default.
bind ? run-shell "tmux set -g @popup_open $(date +%s)" \; display-popup -E -w 72% -h 80% "bash ~/.claude/fleet/bin/fleet-keys.sh" \; set -g @popup_open 0
# Footer mouse clicks, each gated on the clicked segment's own clickable range so
# none ever hijacks another (or a plain status click). Needs `set -g mouse on` —
# now shipped ON in the FLEET BASELINE block at the top of this file (issue #222);
# comment that out there if you'd rather keep native select-to-copy and skip the
# footer clicks. Six ranges, chained via nested if -F:
#   hub    → click the leftmost ⌂ icon to go home to THIS fleet's steward hub
#            (steward-zoom.sh --home, issue #405). CONSISTENT: it always lands on
#            the half-dash / half-steward split — a tap can never zoom you to
#            fullscreen (unlike F9, which jump-and-toggles the zoom). Highlighted
#            bg when you're already on the hub, dim otherwise ("go to hub" button).
#   fleet  → click the #S name to open a picker of RUNNING fleets and switch to the
#            chosen one (fleet-pick.sh). prefix s / switch-client stay manual.
#   attn   → click the red needs badge (● N) to cycle to the next 'needs' window
#            (wrapping); repeated clicks walk all of them. prefix+a stays the
#            keyboard path (priority jump: needs, then done).
#   xfleet → click the ORANGE cross-fleet dot (● N — another fleet is waiting, issue
#            #368) to one-tap jump to it (fleet-xfleet-jump.sh): exactly one waiting
#            fleet → detach-and-reattach to its socket; several → the fleet-picker
#            scoped to just the waiting fleets. Replaces the old ⚑ flag's #S-picker.
#   acct   → click the footer's ◉ <account> chip to open the consolidated usage +
#            account modal (usage-modal.sh, issue #289) — the account pool as a
#            selectable body under the usage/limit detail.
#   usage  → click the footer's usage stat (the 5h/7d figure that colors at the
#            limit) to open the SAME usage-modal.sh — usage/limit detail on top,
#            the account pool below (single-account installs show usage only).
#            There is no longer a keyboard path (prefix A/u were dropped, #289).
# Ranges are emitted by status-left (hub/fleet/attn/xfleet) and bin/tmux-status.sh
# (acct/usage).
bind -n MouseDown1Status if -F '#{==:#{mouse_status_range},fleet}' {
    run-shell "tmux set -g @popup_open $(date +%s)"
    display-popup -E -w 62% -h 50% "bash ~/.claude/fleet/bin/fleet-pick.sh"
    set -g @popup_open 0
} {
    if -F '#{==:#{mouse_status_range},attn}' {
        run-shell "sh ~/.claude/fleet/bin/next-attention.sh --needs-cycle"
    } {
        if -F '#{==:#{mouse_status_range},acct}' {
            run-shell "tmux set -g @popup_open $(date +%s)"
            display-popup -E -w 66% -h 55% "bash ~/.claude/fleet/bin/usage-modal.sh"
            set -g @popup_open 0
        } {
            if -F '#{==:#{mouse_status_range},usage}' {
                run-shell "tmux set -g @popup_open $(date +%s)"
                display-popup -E -w 66% -h 55% "bash ~/.claude/fleet/bin/usage-modal.sh"
                set -g @popup_open 0
            } {
            if -F '#{==:#{mouse_status_range},hub}' {
                run-shell "sh ~/.claude/fleet/bin/steward-zoom.sh --home"
            } {
                if -F '#{==:#{mouse_status_range},xfleet}' {
                    run-shell "tmux set -g @popup_open $(date +%s)"
                    display-popup -E -w 62% -h 50% "bash ~/.claude/fleet/bin/fleet-xfleet-jump.sh"
                    set -g @popup_open 0
                }
            }
            }
        }
    }
}
# F9 (no prefix): one-button jump from any window back to THIS session's steward
# hub (plan window + steward pane). Root-table bind — safe because the Claude TUI
# and shells don't use function keys. steward-zoom.sh scopes to the current session.
bind -n F9 run-shell "sh ~/.claude/fleet/bin/steward-zoom.sh"

# Double-click a pane to toggle its zoom (fullscreen) — the mouse counterpart to
# prefix+g (dash zoom) / F9 (steward zoom). -t= targets the pane under the mouse.
# Also on the pane divider (DoubleClick1Border) as a guaranteed-reachable fallback.
# Trade-off: overrides tmux's default double-click = select-word (copy). Root-table
# (bind -n) intercepts the mouse before the app, like F9/MouseDown1Status — but the
# dash (fzf) + steward (claude TUI) still zoom fine (tested). Comment out to keep
# double-click word-select.
bind -n DoubleClick1Pane   resize-pane -Z -t=
bind -n DoubleClick1Border resize-pane -Z

# let programs set the client clipboard (OSC52), e.g. gh-glance URL copy
set -g set-clipboard on
set -g focus-events on

# solid pane split line — no active-pane highlight on switch
set -g pane-border-style 'fg=#565f89'
set -g pane-active-border-style 'fg=#565f89'
